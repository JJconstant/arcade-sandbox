<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>What time is it, Cora?</title>
    <style>
        :root {
            --pink: #ff769f;
            --purple: #b185ff;
            --light-pink: #ffe3ec;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe3ec 0%, #f1e4ff 100%);
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .sparkle-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(circle, #fff 10%, transparent 11%),
                radial-gradient(circle, #fff 10%, transparent 11%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            opacity: 0.3;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 118, 159, 0.2);
            border: 4px solid var(--pink);
            backdrop-filter: blur(10px);
            max-width: 90%;
            width: 420px;
            position: relative;
            z-index: 2;
        }

        h1 {
            color: #d13b68;
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 10px;
            text-shadow: 2px 2px #fff;
        }

        .audio-btn {
            background: linear-gradient(to bottom, #ff9ebe, var(--pink));
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px #d13b68, 0 8px 10px rgba(0,0,0,0.1);
            transition: all 0.1s ease;
            margin-bottom: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .audio-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px #d13b68;
        }

        /* The Clock Face */
        .clock {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: white;
            border: 12px solid var(--purple);
            position: relative;
            margin: 0 auto 20px auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 8px 0 var(--purple);
        }

        /* Real Numbers on Clock Face */
        .clock-number {
            position: absolute;
            width: 30px;
            height: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #5d35a6;
            text-align: center;
            line-height: 30px;
        }

        /* Hands with CSS Transition for butter-smooth movement */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
            transition: transform 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .hour-hand {
            width: 9px;
            height: 70px;
            background-color: var(--purple);
            margin-left: -4.5px;
            z-index: 4;
        }
        .minute-hand {
            width: 6px;
            height: 105px;
            background-color: var(--pink);
            margin-left: -3px;
            z-index: 5;
        }
        .center-cap {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            background: var(--gold);
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
        }

        .digital-display {
            background: #222;
            color: #ffde59;
            font-family: monospace;
            font-size: 2.6rem;
            padding: 8px 25px;
            border-radius: 15px;
            display: inline-block;
            letter-spacing: 2px;
            border: 4px solid #444;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        /* Swipe Controller Pad */
        .swipe-pad {
            background: linear-gradient(45deg, #ffc2d4, #e1ccff);
            border: 3px dashed var(--purple);
            border-radius: 20px;
            padding: 20px;
            color: #5d35a6;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: ns-resize;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }
        .swipe-arrows {
            font-size: 1.6rem;
            animation: bounceUpDown 1.5s infinite ease-in-out;
            display: block;
            margin: 5px 0;
        }

        @keyframes bounceUpDown {
            0%, 100% { transform: translateY(-3px); }
            50% { transform: translateY(3px); }
        }

        /* iOS Welcome Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffe3ec 0%, #f1e4ff 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .start-btn {
            padding: 20px 50px;
            font-size: 2.5rem;
            background: linear-gradient(45deg, var(--pink), var(--purple));
            color: white;
            border: 5px solid white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-family: inherit;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9;
        }
    </style>
</head>
<body>

    <div class="sparkle-bg"></div>
    <canvas id="celebrationCanvas"></canvas>

    <div class="overlay" id="welcomeOverlay">
        <h1 style="font-size: 3rem; margin-bottom: 30px;">🌈 Cora's Clock Game! ✨</h1>
        <button class="start-btn" onclick="startApp()">START! ▶️</button>
    </div>

    <div class="container">
        <h1>What time is it, Cora?</h1>
        
        <button class="audio-btn" onclick="playQuestion()">🔊</button>

        <div class="clock" id="clockFace">
            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
            <div class="center-cap"></div>
        </div>

        <div>
            <div class="digital-display" id="digitalTime">12:00</div>
        </div>

        <div class="swipe-pad" id="swipeField">
            ✨ Swipe UP or DOWN here ✨
            <span class="swipe-arrows">↕️</span>
            to move the hands!
        </div>
    </div>

    <audio id="audioQuestion" src="IMG_8327.m4a" preload="auto"></audio>
    <audio id="audioSuccess" src="IMG_8328.m4a" preload="auto"></audio>

    <script>
        const audioQuestion = document.getElementById('audioQuestion');
        const audioSuccess = document.getElementById('audioSuccess');

        let targetHour = 0;
        let targetMinute = 0;

        // Cora's Current Time (Starts at 12:00 / 720 minutes into the day)
        let currentMinutes = 12 * 60; 
        let isCelebrating = false;

        // Set up Clock Face Numbers (1 - 12)
        const clockFace = document.getElementById('clockFace');
        for (let i = 1; i <= 12; i++) {
            const angle = (i * 30) * (Math.PI / 180);
            const radius = 105; // Distance from center
            const x = 140 + radius * Math.sin(angle) - 15;
            const y = 140 - radius * Math.cos(angle) - 15;
            
            const numLabel = document.createElement('div');
            numLabel.className = 'clock-number';
            numLabel.innerText = i;
            numLabel.style.left = `${x}px`;
            numLabel.style.top = `${y}px`;
            clockFace.appendChild(numLabel);
        }

        function setTargetToCurrentTime() {
            const now = new Date();
            targetHour = now.getHours() % 12;
            if (targetHour === 0) targetHour = 12;
            targetMinute = now.getMinutes(); // Now tracking exactly to the exact minute
        }

        function startApp() {
            document.getElementById('welcomeOverlay').style.display = 'none';
            setTargetToCurrentTime();
            playQuestion();
            updateClockDisplay();
            setupSwipeControls();
        }

        function playQuestion() {
            if (!isCelebrating) {
                audioQuestion.currentTime = 0;
                audioQuestion.play().catch(e => console.log(e));
            }
        }

        function updateClockDisplay() {
            let hours = Math.floor(currentMinutes / 60) % 12;
            let minutes = currentMinutes % 60;
            if (hours === 0) hours = 12;

            const displayHours = hours.toString().padStart(2, '0');
            const displayMinutes = minutes.toString().padStart(2, '0');
            document.getElementById('digitalTime').innerText = `${displayHours}:${displayMinutes}`;

            // Minute Hand: 6 degrees per minute
            const minuteAngle = minutes * 6;
            // Hour Hand: 30 degrees per hour, plus a continuous fractional shift from the minutes
            const hourAngle = (hours * 30) + (minutes * 0.5);

            document.getElementById('minuteHand').style.transform = `rotate(${minuteAngle}deg)`;
            document.getElementById('hourHand').style.transform = `rotate(${hourAngle}deg)`;
        }

        // Swipe Interactivity logic
        function setupSwipeControls() {
            const swipeField = document.getElementById('swipeField');
            let startY = 0;
            let accumulatedDelta = 0;
            const sensitivity = 8; // Adjust this value to make swiping faster or slower

            function handleStart(e) {
                if (isCelebrating) return;
                startY = e.touches ? e.touches[0].clientY : e.clientY;
                accumulatedDelta = 0;
            }

            function handleMove(e) {
                if (isCelebrating) return;
                const currentY = e.touches ? e.touches[0].clientY : e.clientY;
                const deltaY = startY - currentY; // Up is positive, down is negative

                accumulatedDelta += deltaY;
                startY = currentY;

                // When drag spans across the threshold, move time by 1 continuous minute
                if (Math.abs(accumulatedDelta) >= sensitivity) {
                    const minutesToChange = Math.trunc(accumulatedDelta / sensitivity);
                    accumulatedDelta = accumulatedDelta % sensitivity;
                    
                    currentMinutes += minutesToChange;

                    if (currentMinutes < 0) currentMinutes += 24 * 60;
                    if (currentMinutes >= 24 * 60) currentMinutes -= 24 * 60;

                    updateClockDisplay();
                    checkWinCondition();
                }
            }

            // Mobile/Tablet Touch Listeners
            swipeField.addEventListener('touchstart', handleStart, { passive: true });
            swipeField.addEventListener('touchmove', handleMove, { passive: true });

            // Desktop Mouse Support (for easy testing on your computer)
            swipeField.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', (e) => { if (startY !== 0) handleMove(e); });
            window.addEventListener('mouseup', () => { startY = 0; });
        }

        function checkWinCondition() {
            let hours = Math.floor(currentMinutes / 60) % 12;
            if (hours === 0) hours = 12;
            let minutes = currentMinutes % 60;

            if (hours === targetHour && minutes === targetMinute) {
                triggerWin();
            }
        }

        function triggerWin() {
            isCelebrating = true;
            audioSuccess.currentTime = 0;
            audioSuccess.play().catch(e => console.log(e));

            startCelebrationVisuals();

            setTimeout(() => {
                stopCelebrationVisuals();
                setTargetToCurrentTime();
                currentMinutes = 12 * 60; // Reset to 12:00
                isCelebrating = false;
                updateClockDisplay();
                playQuestion();
            }, 6000);
        }

        // --- Confetti & Balloons Engine ---
        const canvas = document.getElementById('celebrationCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        function startCelebrationVisuals() {
            resizeCanvas();
            particles = [];
            
            for (let i = 0; i < 120; i++) {
                particles.push({
                    type: 'confetti',
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 8 + 5,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                    speedX: Math.random() * 4 - 2,
                    speedY: Math.random() * 5 + 4,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 10 - 5
                });
            }

            for (let i = 0; i < 15; i++) {
                particles.push({
                    type: 'balloon',
                    x: Math.random() * canvas.width,
                    y: canvas.height + (Math.random() * 400),
                    r: Math.random() * 20 + 25,
                    color: `hsl(${Math.random() * 360}, 100%, 65%)`,
                    speedY: -(Math.random() * 2 + 2),
                    swing: Math.random() * 2,
                    swingSpeed: Math.random() * 0.05
                });
            }

            animateVisuals();
        }

        function animateVisuals() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                if (p.type === 'confetti') {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += p.rotationSpeed;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();

                    if (p.y > canvas.height) p.y = -20;
                } else if (p.type === 'balloon') {
                    p.y += p.speedY;
                    p.x += Math.sin(p.y * p.swingSpeed) * p.swing;

                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y + p.r);
                    ctx.lineTo(p.x, p.y + p.r + 40);
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(p.x - p.r/3, p.y - p.r/3, p.r/4, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.fill();

                    if (p.y < -p.r * 2) p.y = canvas.height + 100;
                }
            });

            animationFrameId = requestAnimationFrame(animateVisuals);
        }

        function stopCelebrationVisuals() {
            cancelAnimationFrame(animationFrameId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
